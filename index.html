    function LangCategoryCard({lang,cat,onToggle,onAdd,onDel}){
      const[form,setForm]=useState(null);
      const total = (cat.items||[]).filter(i=>i.done).reduce((a,i)=>a+(i.points||1),0);
      const CAT_ICON = {grammar:"📐",vocab:"🔤",speaking:"🗣️",writing:"✍️"};
      const CAT_UNIT = {grammar:"điểm ngữ pháp",vocab:"từ vựng",speaking:"chủ đề đã nói",writing:"bài viết"};
      return <div style={{background:T.surf,border:`1px solid ${T.border}`,borderRadius:12,padding:14,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:700}}>{CAT_ICON[cat.key]||"📋"} {cat.label}</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:800,color:lang.color}}>{total}</div>
            <div style={{fontSize:9,color:T.t3}}>{CAT_UNIT[cat.key]||""}</div>
          </div>
        </div>
        {(cat.items||[]).map(it=><div key={it.id} onClick={()=>onToggle(it.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,cursor:"pointer",marginBottom:2,background:it.done?`${lang.color}14`:"transparent"}}>
          <DualCheck val={it.done} color={lang.color}/>
          <span style={{fontSize:11,color:it.done?T.t3:T.t2,textDecoration:it.done?"line-through":"none",flex:1}}>{it.text}</span>
          <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:`${lang.color}1f`,color:lang.color}}>+{it.points||1}</span>
          <MiniBtn onClick={()=>onDel(it.id)} color={T.t3}>×</MiniBtn>
        </div>)}
        {form ? <div style={{display:"flex",gap:6,marginTop:8}}>
          <input value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))} placeholder="vd: Học 50 từ chủ đề Beruf"
            style={{flex:1,padding:"5px 8px",background:"#0D1117",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:11,outline:"none"}}/>
          <input type="number" value={form.points} onChange={e=>setForm(f=>({...f,points:e.target.value}))} placeholder="1" style={{width:50,padding:"5px 8px",background:"#0D1117",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:11,outline:"none"}}/>
          <button onClick={()=>{ if(form.text){ onAdd(form.text, parseInt(form.points)||1); setForm(null); } }} style={{padding:"5px 10px",borderRadius:6,border:"none",background:lang.color,color:"#000",fontWeight:700,cursor:"pointer",fontSize:11}}>+</button>
        </div> : <button onClick={()=>setForm({text:"",points:1})} style={{marginTop:8,padding:"5px 10px",borderRadius:6,border:`1px dashed ${T.border}`,background:"transparent",color:T.t3,cursor:"pointer",fontSize:11,width:"100%"}}>+ Thêm việc</button>}
      </div>;
    }

    function LanguagesTab({data,setData,myId}){
      const bump = (langId,fn) => setData(p=>({...p, languages:p.languages.map(l=>l.id!==langId?l:{...fn(l),_t:Date.now()})}));
      const toggle = (langId,catId,itemId) => bump(langId, l=>({...l, categories:l.categories.map(c=>c.id!==catId?c:{...c,_t:Date.now(),items:c.items.map(it=>it.id!==itemId?it:{...it,done:!it.done,doneBy:!it.done?myId:it.doneBy,_t:Date.now()})})}));
      const addItem = (langId,catId,text,points) => bump(langId, l=>({...l, categories:l.categories.map(c=>c.id!==catId?c:{...c,items:[...c.items,{id:uid(),text,points,done:false,doneBy:null,_t:0}]})}));
      const delItem = (langId,catId,itemId) => bump(langId, l=>({...l, categories:l.categories.map(c=>c.id!==catId?c:{...c,items:c.items.filter(it=>it.id!==itemId)})}));

      return <div>
        {data.languages.map(lang=><div key={lang.id} style={{marginBottom:24}}>
          <div style={{fontSize:15,fontWeight:700,color:lang.color,marginBottom:10}}>{lang.icon} {lang.label}</div>
          {lang.categories.map(cat=><LangCategoryCard key={cat.id} lang={lang} cat={cat}
            onToggle={id=>toggle(lang.id,cat.id,id)} onAdd={(text,points)=>addItem(lang.id,cat.id,text,points)} onDel={id=>delItem(lang.id,cat.id,id)}/>)}
        </div>)}
      </div>;
    }

    // ═══════════════════════════════════════════════
    //  TAB: SESSIONS
    // ═══════════════════════════════════════════════
    function flattenTopics(subj){
      return subj.sections.flatMap(sec=>sec.topics.map(top=>({id:top.id, key:top.id, label:(sec.label?sec.label+" › ":"")+top.label})));
    }

    function SessionsTab({data,setData,myId}){
      const[showForm,setShowForm]=useState(false);
      const[form,setForm]=useState({date:toKey(addDay(new Date(),2)),time:"14:00",subject:"micro",topic:"",topicId:null});
      const[exp,setExp]=useState(null);
      const[tf,setTf]=useState(null);

      const curSubj = data.subjects.find(s=>s.key===form.subject);
      const topicOptions = curSubj ? flattenTopics(curSubj) : null;

      const addSess=()=>{
        if(!form.date||!form.topic)return;
        const s={...form,id:uid(),status:"planned",notes:"",_t:Date.now(),preTodos:mkPreTodos(),duringTodos:mkDuringTodos(),postTodos:mkPostTodos()};
        setData(p=>({...p,sessions:[...p.sessions,s]}));
        setShowForm(false); setExp(s.id);
      };
      const togDual=(sid,pk,tid,who)=>setData(p=>({...p,sessions:p.sessions.map(s=>{
        if(s.id!==sid) return s;
        return {...s,_t:Date.now(),[pk]:s[pk].map(t=>{
          if(t.id!==tid) return t;
          if(who===1) return {...t, doneBy1:!t.doneBy1, _t1:Date.now()};
          return {...t, doneBy2:!t.doneBy2, _t2:Date.now()};
        })};
      })}));
      const togSingle=(sid,pk,tid)=>setData(p=>({...p,sessions:p.sessions.map(s=>s.id!==sid?s:{...s,_t:Date.now(),[pk]:s[pk].map(t=>t.id!==tid?t:{...t,done:!t.done,doneBy:!t.done?myId:t.doneBy,_t:Date.now()})})}));
      const addTodo=(sid,pk,text)=>setData(p=>({...p,sessions:p.sessions.map(s=>{
        if(s.id!==sid) return s;
        const isDual = pk==="preTodos";
        const item = isDual ? {id:uid(),text,doneBy1:false,doneBy2:false,_t1:0,_t2:0} : {id:uid(),text,done:false,doneBy:null,_t:0};
        return {...s,_t:Date.now(),[pk]:[...s[pk],item]};
      })}));
      const updNote=(sid,v)=>setData(p=>({...p,sessions:p.sessions.map(s=>s.id!==sid?s:{...s,notes:v,_t:Date.now()})}));
      const markDone=id=>setData(p=>({...p,sessions:p.sessions.map(s=>s.id!==id?s:{...s,status:"done",_t:Date.now()})}));
      const delSess=id=>setData(p=>({...p,sessions:p.sessions.filter(s=>s.id!==id),_deleted:{...p._deleted,sessions:{...p._deleted.sessions,[id]:Date.now()}}}));
      const addHtodo=t=>{ setData(p=>({...p,todos:[{...t,id:uid(),doneBy1:false,doneBy2:false,_t1:0,_t2:0,_t:Date.now()},...(p.todos||[])]})); setTf(null); };
      const togHtodo=(id,who)=>setData(p=>({...p,todos:(p.todos||[]).map(t=>{
        if(t.id!==id) return t;
        if(who===1) return {...t, doneBy1:!t.doneBy1, _t1:Date.now(), _t:Date.now()};
        return {...t, doneBy2:!t.doneBy2, _t2:Date.now(), _t:Date.now()};
      })}));
      const delHtodo=id=>setData(p=>({...p,todos:(p.todos||[]).filter(t=>t.id!==id),_deleted:{...p._deleted,todos:{...p._deleted.todos,[id]:Date.now()}}}));

      const PHASEDEF=[
        {key:"preTodos",  label:"📖 TRƯỚC BUỔI HỌC (mỗi người tự làm — tick riêng)", color:T.xp, dual:true},
        {key:"duringTodos",label:"👥 TRONG BUỔI HỌC", color:T.ok, dual:false},
        {key:"postTodos", label:"📝 SAU BUỔI HỌC",     color:T.c1, dual:false},
      ];
      const upcoming=data.sessions.filter(s=>s.status!=="done").sort((a,b)=>a.date.localeCompare(b.date));
      const done=data.sessions.filter(s=>s.status==="done");

      return <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700}}>Buổi học nhóm</div>
          <button onClick={()=>setShowForm(v=>!v)} style={{padding:"7px 14px",borderRadius:20,border:"none",background:T.ok,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>{showForm?"× Đóng":"+ Thêm buổi học"}</button>
        </div>

        {showForm&&<div style={{background:T.surf,border:`1px solid ${T.ok}44`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <Field label="Ngày"><Input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></Field>
            <Field label="Giờ bắt đầu"><Input type="time" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))}/></Field>
          </div>
          <Field label="Môn"><Select value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value,topic:"",topicId:null}))} options={SUBJECTS}/></Field>
          <div style={{marginTop:8,marginBottom:12}}>
            {topicOptions ? <Field label="Chọn topic từ curriculum">
              <Select value={form.topicId||""} onChange={e=>{ const opt=topicOptions.find(o=>o.id===e.target.value); setForm(p=>({...p,topicId:opt?opt.id:null,topic:opt?opt.label:""})); }}
                options={[{key:"",label:"— Chọn topic —"},...topicOptions]}/>
            </Field> : <Field label="Topic / Nội dung buổi học"><Input value={form.topic} onChange={e=>setForm(p=>({...p,topic:e.target.value}))} placeholder="vd: Speaking warm-up, Essay review..."/></Field>}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowForm(false)} style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:12}}>Hủy</button>
            <button onClick={addSess} style={{padding:"7px 14px",borderRadius:6,border:"none",background:T.ok,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Thêm buổi học</button>
          </div>
        </div>}

        {!upcoming.length&&!showForm&&<div style={{textAlign:"center",padding:24,color:T.t3,background:T.surf,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:16}}><div style={{fontSize:24,marginBottom:6}}>📭</div>Chưa có buổi học nào sắp tới.</div>}

        {upcoming.map(s=>{
          const isOpen=exp===s.id;
          const dualDone=(s.preTodos||[]).filter(t=>t.doneBy1&&t.doneBy2).length;
          const singleDone=[...(s.duringTodos||[]),...(s.postTodos||[])].filter(t=>t.done).length;
          const totalCnt=(s.preTodos||[]).length+(s.duringTodos||[]).length+(s.postTodos||[]).length;
          const doneCnt=dualDone+singleDone;
          return <div key={s.id} style={{background:T.surf,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
            <div onClick={()=>setExp(isOpen?null:s.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
              <span style={{fontSize:18}}>{s.subject==="micro"?"📊":s.subject==="macro"?"📈":"🌍"}</span>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{s.topic}</div><div style={{fontSize:11,color:T.t2}}>{new Date(s.date).toLocaleDateString("vi-VN")} · {s.time}</div></div>
              <div style={{textAlign:"center",minWidth:36}}><div style={{fontSize:12,fontWeight:700,color:doneCnt===totalCnt&&totalCnt>0?T.ok:T.t2}}>{doneCnt}/{totalCnt}</div><div style={{fontSize:9,color:T.t3}}>todos</div></div>
              <button onClick={e=>{e.stopPropagation();markDone(s.id);}} style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${T.ok}44`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:11}}>✓</button>
              <button onClick={e=>{e.stopPropagation();delSess(s.id);}} style={{padding:"2px 6px",borderRadius:6,border:"none",background:"transparent",color:T.t3,cursor:"pointer",fontSize:16}}>×</button>
              <span style={{fontSize:9,color:T.t3}}>{isOpen?"▲":"▼"}</span>
            </div>
            {isOpen&&<div style={{borderTop:`1px solid ${T.border}`,padding:14}}>
              {PHASEDEF.map(ph=><div key={ph.key} style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:700,color:ph.color,letterSpacing:.5,marginBottom:6}}>{ph.label}</div>
                {ph.dual
                  ? (s[ph.key]||[]).map(t=><DualTodoRow key={t.id} todo={t} onToggle1={()=>togDual(s.id,ph.key,t.id,1)} onToggle2={()=>togDual(s.id,ph.key,t.id,2)}/>)
                  : (s[ph.key]||[]).map(t=><TodoRow key={t.id} todo={t} color={ph.color} onToggle={()=>togSingle(s.id,ph.key,t.id)}/>)}
                <InlineAdd color={ph.color} placeholder="+ Thêm việc cần làm..." onAdd={text=>addTodo(s.id,ph.key,text)}/>
              </div>)}
              <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12}}>
                <div style={{fontSize:10,fontWeight:700,color:T.t2,letterSpacing:.5,marginBottom:6}}>📌 NOTE / LINK TÀI LIỆU BUỔI HỌC NÀY</div>
                <textarea value={s.notes||""} onChange={e=>updNote(s.id,e.target.value)} placeholder="Ghi chú, link slide, đáp án bài tập, câu hỏi chưa giải được..."
                  style={{width:"100%",minHeight:70,padding:"8px 10px",background:"#090D14",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>
            </div>}
          </div>;
        })}

        {done.length>0&&<div style={{marginTop:8,opacity:.55}}>
          <div style={{fontSize:11,color:T.t3,marginBottom:6}}>✓ Đã xong ({done.length} buổi)</div>
          {done.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",background:T.surf,border:`1px solid ${T.border}44`,borderRadius:8,marginBottom:4}}>
            <span style={{fontSize:14}}>{s.subject==="micro"?"📊":"📈"}</span>
            <span style={{flex:1,fontSize:12,color:T.t3,textDecoration:"line-through"}}>{s.topic}</span>
            <span style={{fontSize:11,color:T.t3}}>{new Date(s.date).toLocaleDateString("vi-VN")}</span>
          </div>)}
        </div>}

        <div style={{marginTop:28}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700}}>📚 Nhiệm vụ ở nhà (tick riêng từng người)</div>
            <button onClick={()=>setTf({text:"",who:"both",subject:"micro"})} style={{padding:"6px 12px",borderRadius:20,border:"none",background:T.xp,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Thêm</button>
          </div>
          {tf&&<div style={{background:T.surf,border:`1px solid ${T.xp}44`,borderRadius:10,padding:14,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8,marginBottom:8}}>
              <Field label="Nhiệm vụ"><Input value={tf.text} onChange={e=>setTf(f=>({...f,text:e.target.value}))} placeholder="vd: Ôn lý thuyết IV..."/></Field>
              <Field label="Môn"><Select value={tf.subject} onChange={e=>setTf(f=>({...f,subject:e.target.value}))} options={SUBJECTS}/></Field>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setTf(null)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:12}}>Hủy</button>
              <button onClick={()=>{if(tf.text)addHtodo(tf);}} style={{padding:"6px 12px",borderRadius:6,border:"none",background:T.xp,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Thêm</button>
            </div>
          </div>}
          {(data.todos||[]).filter(t=>!(t.doneBy1&&t.doneBy2)).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surf,border:`1px solid ${T.border}`,borderRadius:8,marginBottom:5}}>
            <DualCheck val={t.doneBy1} onClick={()=>togHtodo(t.id,1)} color={T.c1}/>
            <DualCheck val={t.doneBy2} onClick={()=>togHtodo(t.id,2)} color={T.c2}/>
            <span style={{flex:1,fontSize:12}}>{t.text}</span>
            <span style={{fontSize:10,color:T.t3}}>{t.subject}</span>
            <button onClick={()=>delHtodo(t.id)} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:15}}>×</button>
          </div>)}
          {(data.todos||[]).filter(t=>t.doneBy1&&t.doneBy2).length>0&&<div style={{marginTop:6,opacity:.5}}>
            {(data.todos||[]).filter(t=>t.doneBy1&&t.doneBy2).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:8,marginBottom:3}}>
              <div style={{width:14,height:14,borderRadius:3,background:T.ok,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#000",fontWeight:900}}>✓</div>
              <span style={{flex:1,fontSize:12,color:T.t3,textDecoration:"line-through"}}>{t.text}</span>
            </div>)}
          </div>}
        </div>
      </div>;
    }

    // ═══════════════════════════════════════════════
    //  TAB: NOTES (with comments)
    // ═══════════════════════════════════════════════
    function NoteCard({n,myId,onDelete,onComment,onDelComment}){
      const[open,setOpen]=useState(false);
      const[ctext,setCtext]=useState("");
      const TM={text:{icon:"📝",color:T.c1},link:{icon:"🔗",color:"#34D399"},question:{icon:"❓",color:T.xp},answer:{icon:"✅",color:T.ok}};
      const m=TM[n.type]||TM.text, sc=sColor(n.subject);
      const comments = n.comments||[];
      return <div style={{background:T.surf,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
          <span style={{fontSize:16,flexShrink:0}}>{m.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{n.title}</div>
            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:`${sc}22`,color:sc}}>{n.subject}</span>
              <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:`${m.color}22`,color:m.color}}>{n.type}</span>
              <span style={{fontSize:10,color:T.t3}}>{personName(n.by)} · {n.date}</span>
            </div>
          </div>
          <button onClick={onDelete} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:16,flexShrink:0}}>×</button>
        </div>
        <div style={{fontSize:12,color:T.t2,paddingLeft:24,lineHeight:1.6,wordBreak:"break-word",marginBottom:8}}>
          {n.type==="link" ? <a href={n.content} target="_blank" rel="noopener noreferrer">{n.content}</a> : <div style={{whiteSpace:"pre-wrap"}}>{n.content}</div>}
        </div>
        <div style={{paddingLeft:24}}>
          <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:11,padding:0}}>💬 {comments.length} bình luận {open?"▲":"▼"}</button>
          {open && <div style={{marginTop:8}}>
            {comments.map(c=><div key={c.id} style={{display:"flex",gap:6,alignItems:"flex-start",padding:"6px 0",borderTop:`1px solid ${T.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:T.text}}>{c.text}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}}>{personName(c.by)} · {c.date}</div>
              </div>
              <MiniBtn onClick={()=>onDelComment(c.id)} color={T.t3}>×</MiniBtn>
            </div>)}
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <input value={ctext} onChange={e=>setCtext(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&ctext.trim()){onComment(ctext.trim());setCtext("");} }}
                placeholder="Viết bình luận / câu trả lời..." style={{flex:1,padding:"6px 9px",background:"#0D1117",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:11,outline:"none"}}/>
              <button onClick={()=>{ if(ctext.trim()){onComment(ctext.trim());setCtext("");} }} style={{padding:"6px 12px",borderRadius:6,border:"none",background:T.c2,color:"#000",fontWeight:700,cursor:"pointer",fontSize:11}}>Gửi</button>
            </div>
          </div>}
        </div>
      </div>;
    }

    function NotesTab({data,setData,myId}){
      const[filter,setFilter]=useState("all");
      const[form,setForm]=useState(null);
      const filtered=(data.notes||[]).filter(n=>filter==="all"||n.subject===filter||n.type===filter);
      const addNote=()=>{
        if(!form?.title||!form?.content)return;
        setData(p=>({...p,notes:[{...form,id:uid(),by:myId||"?",date:new Date().toLocaleDateString("vi-VN"),_t:Date.now(),comments:[]},...(p.notes||[])]}));
        setForm(null);
      };
      const delNote = id => setData(p=>({...p,notes:p.notes.filter(x=>x.id!==id),_deleted:{...p._deleted,notes:{...p._deleted.notes,[id]:Date.now()}}}));
      const addComment = (noteId,text) => setData(p=>({...p,notes:p.notes.map(n=>n.id!==noteId?n:{...n,_t:Date.now(),comments:[...(n.comments||[]),{id:uid(),text,by:myId||"?",date:new Date().toLocaleDateString("vi-VN"),_t:Date.now()}]})}));
      const delComment = (noteId,cId) => setData(p=>({...p,notes:p.notes.map(n=>n.id!==noteId?n:{...n,comments:(n.comments||[]).filter(c=>c.id!==cId)})}));

      return <div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>{NOTE_FILTERS.map(f=><PillBtn key={f.key} active={filter===f.key} onClick={()=>setFilter(f.key)}>{f.label}</PillBtn>)}</div>
          <button onClick={()=>setForm({title:"",content:"",type:"text",subject:"general"})} style={{padding:"7px 14px",borderRadius:20,border:"none",background:T.c2,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Thêm note</button>
        </div>
        {form&&<div style={{background:T.surf,border:`1px solid ${T.c2}44`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8,marginBottom:10}}>
            <Field label="Tiêu đề"><Input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Tên note, câu hỏi, link tài liệu..."/></Field>
            <Field label="Loại"><Select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} options={[{key:"text",label:"📝 Note"},{key:"link",label:"🔗 Link"},{key:"question",label:"❓ Câu hỏi"},{key:"answer",label:"✅ Đáp án"}]}/></Field>
            <Field label="Chủ đề"><Select value={form.subject} onChange={e=>setForm(f=>({...f,subject:e.target.value}))} options={[{key:"general",label:"📌 Chung"},...SUBJECTS]}/></Field>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:T.t2,marginBottom:3}}>{form.type==="link"?"URL / Link":"Nội dung / Câu hỏi / Đáp án"}</div>
            <textarea value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder={form.type==="link"?"https://...":"Viết ghi chú, câu hỏi, đáp án, hoặc paste link..."}
              style={{width:"100%",minHeight:80,padding:"8px 10px",background:"#0D1117",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setForm(null)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:12}}>Hủy</button>
            <button onClick={addNote} style={{padding:"6px 12px",borderRadius:6,border:"none",background:T.c2,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Lưu note</button>
          </div>
        </div>}
        {filtered.length===0
          ? <div style={{textAlign:"center",padding:30,color:T.t3}}><div style={{fontSize:28,marginBottom:8}}>📭</div>Chưa có note. Thêm ghi chú, link tài liệu, câu hỏi!</div>
          : filtered.map(n=><NoteCard key={n.id} n={n} myId={myId} onDelete={()=>delNote(n.id)} onComment={text=>addComment(n.id,text)} onDelComment={cId=>delComment(n.id,cId)}/>)}
      </div>;
    }

    // ═══════════════════════════════════════════════
    //  CONTEXT HELPER (pass myId down without prop-drilling everywhere)
    // ═══════════════════════════════════════════════
    const MyIdCtx = React.createContext(null);
    function CtxConsumer({render}){ return <MyIdCtx.Consumer>{render}</MyIdCtx.Consumer>; }

    // ═══════════════════════════════════════════════
    //  SYNC MODAL
    // ═══════════════════════════════════════════════
    function SyncModal({data,setData,myId,room,setRoom,cloudStatus,lastSync,onForceSync,onClose}){
      const[mode,setMode]=useState("cloud");
      const[joinCode,setJoinCode]=useState("");
      const[creating,setCreating]=useState(false);
      const[joining,setJoining]=useState(false);
      const[err,setErr]=useState("");
      const[copied,setCopied]=useState(false);
      const[manMode,setManMode]=useState("export");
      const[imp,setImp]=useState("");
      const[impErr,setImpErr]=useState("");
      const[impOk,setImpOk]=useState(false);
      const json=JSON.stringify(data,null,2);

      const createRoom=async()=>{
        setCreating(true); setErr("");
        try{ const id=await kvCreateBucket(); await cloudPush(id,data); setRoom(id); saveRoom(id); }
        catch(e){ setErr(`Không tạo được phòng. Chi tiết lỗi: ${e.message}. Nếu lỗi lặp lại, dùng tab Thủ công bên cạnh để gửi qua Zalo.`); }
        setCreating(false);
      };
      const joinRoom=async()=>{
        const code=joinCode.trim(); if(!code) return;
        setJoining(true); setErr("");
        try{
          const cloud=await cloudPull(code);
          const hasAny=KV_SECTIONS.some(k=>cloud[k]!==null && cloud[k]!==undefined);
          if(!hasAny) throw new Error("empty");
          setData(prev=>mergeData(prev,cloud,myId));
          setRoom(code); saveRoom(code);
        }catch(e){ setErr(`Không vào được phòng. Chi tiết: ${e.message||"phòng trống hoặc sai mã"}. Kiểm tra lại mã, hoặc dùng tab Thủ công.`); }
        setJoining(false);
      };
      const leaveRoom=()=>{ setRoom(null); saveRoom(null); setErr(""); };
      const copyCode=()=>{ navigator.clipboard.writeText(room).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}); };
      const copyJson=()=>{ navigator.clipboard.writeText(json).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}); };
      const doImport=()=>{
        try{ const parsed=migrate(JSON.parse(imp)); setData(parsed); saveData(parsed); setImpOk(true); setImpErr(""); setTimeout(()=>onClose(),1000); }
        catch{ setImpErr("Dữ liệu không hợp lệ."); }
      };
      const statusMeta = {idle:{color:T.t3,label:"Chưa kết nối"},syncing:{color:T.xp,label:"Đang đồng bộ..."},synced:{color:T.ok,label:"Đã đồng bộ"},error:{color:T.err,label:"Lỗi kết nối — sẽ tự thử lại"}}[cloudStatus]||{color:T.t3,label:""};

      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
        <div style={{background:T.surf2,border:`1px solid ${T.border}`,borderRadius:14,padding:20,width:"100%",maxWidth:520,maxHeight:"88vh",display:"flex",flexDirection:"column",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:16,fontWeight:700}}>🔄 Đồng bộ dữ liệu</div>
            <button onClick={onClose} style={{background:"none",border:"none",color:T.t2,cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            <button onClick={()=>setMode("cloud")} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:mode==="cloud"?T.ok:"#1E2A40",color:mode==="cloud"?"#000":T.t2}}>☁️ Phòng chung</button>
            <button onClick={()=>setMode("manual")} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:mode==="manual"?T.c2:"#1E2A40",color:mode==="manual"?"#000":T.t2}}>📋 Thủ công</button>
          </div>
          {mode==="cloud" && <div>
            {!room ? <div>
              <div style={{marginBottom:18}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>👉 Người tạo phòng (làm 1 lần)</div>
                <button onClick={createRoom} disabled={creating} style={{width:"100%",padding:"11px",borderRadius:8,border:"none",background:creating?"#1E2A40":T.ok,color:creating?T.t3:"#000",fontWeight:700,cursor:creating?"default":"pointer",fontSize:13}}>{creating?"Đang tạo phòng...":"➕ Tạo phòng mới"}</button>
              </div>
              <div style={{borderTop:`1px solid ${T.border}`,paddingTop:16}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>👉 Người còn lại — nhập mã phòng</div>
                <div style={{display:"flex",gap:8}}>
                  <Input value={joinCode} onChange={e=>setJoinCode(e.target.value)} placeholder="Paste mã phòng vào đây..."/>
                  <button onClick={joinRoom} disabled={joining||!joinCode.trim()} style={{padding:"7px 16px",borderRadius:8,border:"none",background:joinCode.trim()?T.c2:"#1E2A40",color:joinCode.trim()?"#000":T.t3,fontWeight:700,cursor:joinCode.trim()?"pointer":"default",fontSize:13,whiteSpace:"nowrap"}}>{joining?"...":"Vào phòng"}</button>
                </div>
              </div>
              {err&&<div style={{fontSize:12,color:T.err,marginTop:14,padding:"8px 10px",background:"#2A0A0A",borderRadius:8}}>⚠️ {err}</div>}
            </div> : <div>
              <div style={{fontSize:11,color:T.t2,marginBottom:6}}>Mã phòng hiện tại:</div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <div style={{flex:1,padding:"9px 12px",background:"#090D14",border:`1px solid ${T.border}`,borderRadius:8,fontFamily:"monospace",fontSize:13,color:T.ok,wordBreak:"break-all"}}>{room}</div>
                <button onClick={copyCode} style={{padding:"9px 14px",borderRadius:8,border:"none",background:copied?T.ok:T.c1,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"}}>{copied?"✓":"📋 Copy"}</button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:T.surf,border:`1px solid ${T.border}`,borderRadius:8,marginBottom:14}}>
                <div className={cloudStatus==="syncing"?"pulse":""} style={{width:8,height:8,borderRadius:"50%",background:statusMeta.color,flexShrink:0}}/>
                <span style={{fontSize:12,color:T.t2,flex:1}}>{statusMeta.label}{lastSync?` · ${new Date(lastSync).toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})}`:""}</span>
                <button onClick={onForceSync} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:11}}>Sync ngay</button>
              </div>
              <button onClick={leaveRoom} style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:12}}>Rời phòng</button>
            </div>}
          </div>}
          {mode==="manual" && <div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              <button onClick={()=>setManMode("export")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:manMode==="export"?T.c1:"#1E2A40",color:manMode==="export"?"#000":T.t2}}>📤 Xuất</button>
              <button onClick={()=>setManMode("import")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:manMode==="import"?T.c2:"#1E2A40",color:manMode==="import"?"#000":T.t2}}>📥 Nhập</button>
            </div>
            {manMode==="export" ? <div>
              <textarea readOnly value={json} style={{width:"100%",minHeight:160,padding:10,background:"#090D14",border:`1px solid ${T.border}`,borderRadius:8,color:T.t2,fontSize:10,outline:"none",resize:"none",fontFamily:"monospace"}}/>
              <button onClick={copyJson} style={{width:"100%",marginTop:10,padding:"10px",borderRadius:8,border:"none",background:copied?T.ok:T.c1,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>{copied?"✓ Đã copy!":"📋 Copy dữ liệu"}</button>
            </div> : <div>
              <textarea value={imp} onChange={e=>{setImp(e.target.value);setImpErr("");setImpOk(false);}} placeholder="Paste nội dung JSON vào đây..."
                style={{width:"100%",minHeight:160,padding:10,background:"#090D14",border:`1px solid ${impErr?T.err:T.border}`,borderRadius:8,color:T.text,fontSize:11,outline:"none",resize:"none",fontFamily:"monospace"}}/>
              {impErr&&<div style={{fontSize:11,color:T.err,marginTop:6}}>⚠️ {impErr}</div>}
              {impOk&&<div style={{fontSize:11,color:T.ok,marginTop:6}}>✓ Đồng bộ thành công!</div>}
              <button onClick={doImport} disabled={!imp.trim()} style={{width:"100%",marginTop:10,padding:"10px",borderRadius:8,border:"none",background:imp.trim()?T.c2:"#1E2A40",color:imp.trim()?"#000":T.t3,fontWeight:700,cursor:imp.trim()?"pointer":"default",fontSize:13}}>🔄 Đồng bộ dữ liệu</button>
            </div>}
          </div>}
        </div>
      </div>;
    }

    // ═══════════════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════════════
    function App(){
      const[myId,setMyId]=useState(()=>loadId());
      const[data,setData]=useState(()=>loadData());
      const[tab,setTab]=useState("roadmap");
      const[showSync,setShowSync]=useState(false);
      const[room,setRoom]=useState(()=>loadRoom());
      const[cloudStatus,setCloudStatus]=useState("idle");
      const[lastSync,setLastSync]=useState(null);
      const pushTimer=useRef(null), pulling=useRef(false), pushing=useRef(false);

      useEffect(()=>{ saveData(data); },[data]);
      const setId=id=>{ setMyId(id); saveId(id); };

      useEffect(()=>{
        if(!room){ setCloudStatus("idle"); return; }
        let alive=true;
        const pull=async()=>{
          if(pulling.current) return; pulling.current=true;
          try{
            const cloud=await cloudPull(room);
            const hasAny=KV_SECTIONS.some(k=>cloud[k]!==null && cloud[k]!==undefined);
            if(hasAny && alive){ setData(prev=>mergeData(prev,cloud,myId)); setCloudStatus("synced"); setLastSync(Date.now()); }
          }catch(e){ if(alive) setCloudStatus("error"); }
          pulling.current=false;
        };
        pull();
        const iv=setInterval(pull,15000);
        return ()=>{ alive=false; clearInterval(iv); };
      },[room,myId]);

      useEffect(()=>{
        if(!room) return;
        clearTimeout(pushTimer.current);
        pushTimer.current=setTimeout(async()=>{
          if(pushing.current) return; pushing.current=true;
          setCloudStatus("syncing");
          try{
            const cloud=await cloudPull(room).catch(()=>null);
            const merged=mergeData(data,cloud,myId);
            if(JSON.stringify(merged)!==JSON.stringify(data)) setData(merged);
            await cloudPush(room,merged);
            setCloudStatus("synced"); setLastSync(Date.now());
          }catch(e){ setCloudStatus("error"); }
          pushing.current=false;
        },1200);
        return ()=>clearTimeout(pushTimer.current);
      },[data,room]);

      const forceSync=async()=>{
        if(!room) return;
        setCloudStatus("syncing");
        try{ const cloud=await cloudPull(room); const merged=mergeData(data,cloud,myId); setData(merged); await cloudPush(room,merged); setCloudStatus("synced"); setLastSync(Date.now()); }
        catch(e){ setCloudStatus("error"); }
      };

      const game = computeGame(data);
      const nearestKd = [...data.keyDates].filter(k=>dleft(k.date)>=0).sort((a,b)=>a.date.localeCompare(b.date))[0];
      const statusDot = {idle:T.t3,syncing:T.xp,synced:T.ok,error:T.err}[cloudStatus];
      const TABS=[
        {key:"roadmap",label:"🗺️ Roadmap"},
        {key:"calendar",label:"📅 Lịch"},
        {key:"subjects",label:"📚 Môn học"},
        {key:"languages",label:"🌍 Ngôn ngữ"},
        {key:"sessions",label:"✅ Buổi học"},
        {key:"notes",label:"📎 Notes"},
      ];

      return <MyIdCtx.Provider value={myId}>
      <div style={{minHeight:"100vh"}}>
        {showSync&&<SyncModal data={data} setData={setData} myId={myId} room={room} setRoom={r=>setRoom(r)} cloudStatus={cloudStatus} lastSync={lastSync} onForceSync={forceSync} onClose={()=>setShowSync(false)}/>}

        <div style={{background:T.surf2,borderBottom:`1px solid ${T.border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,gap:8,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:17,fontWeight:800}}>🤝 Squad Space</div>
              <div style={{fontSize:10,color:T.t2}}>{nearestKd?`⏰ ${nearestKd.label}: còn ${dleft(nearestKd.date)} ngày`:"Không gian học nhóm"}</div>
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:T.t3}}>Tôi là</span>
              {[1,2].map(id=><button key={id} onClick={()=>setId(id)} style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,border:`1px solid ${(id===1?T.c1:T.c2)}55`,background:myId===id?(id===1?T.c1:T.c2):"transparent",color:myId===id?"#000":(id===1?T.c1:T.c2)}}>{id===1?`🧑 ${NAME1}`:`👤 ${NAME2}`}</button>)}
              <button onClick={()=>setShowSync(true)} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,border:`1px solid ${room?statusDot+"55":T.ok+"55"}`,background:"transparent",color:room?statusDot:T.ok,cursor:"pointer",fontSize:11,fontWeight:700}}>
                <span className={cloudStatus==="syncing"?"pulse":""} style={{width:6,height:6,borderRadius:"50%",background:room?statusDot:T.t3,display:"inline-block"}}/>{room?"☁️ Đã kết nối":"🔄 Sync"}
              </button>
            </div>
          </div>
          {/* Gamification strip */}
          <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:14}}>🔥</span><span style={{fontWeight:800,color:T.xp,fontSize:13}}>{game.streak}</span><span style={{fontSize:9,color:T.t3}}>ngày streak</span></div>
            <div style={{flex:1,minWidth:130}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.t2,marginBottom:2}}><span>⭐ Lv{game.level.level} {game.level.name}</span><span>{game.xp} XP</span></div>
              <Bar value={game.level.pct} max={100} color={T.xp} h={5}/>
            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:5,padding:"10px 14px",background:T.surf,borderBottom:`1px solid ${T.border}`,overflowX:"auto"}}>
          {TABS.map(t=><button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",background:tab===t.key?T.text:"#1E2A40",color:tab===t.key?T.bg:T.t2,transition:"all .15s"}}>{t.label}</button>)}
        </div>

        <div style={{padding:"18px 14px",maxWidth:780,margin:"0 auto"}}>
          {tab==="roadmap"   && <RoadmapTab data={data} setData={setData} game={game}/>}
          {tab==="calendar"  && <CalendarTab data={data} setData={setData} myId={myId}/>}
          {tab==="subjects"  && <SubjectsTab data={data} setData={setData}/>}
          {tab==="languages" && <LanguagesTab data={data} setData={setData} myId={myId}/>}
          {tab==="sessions"  && <SessionsTab data={data} setData={setData} myId={myId}/>}
          {tab==="notes"     && <NotesTab data={data} setData={setData} myId={myId}/>}
        </div>
      </div>
      </MyIdCtx.Provider>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
