<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🤝 Squad Space</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0D1117;color:#E2E8F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
    button{transition:all .15s;font-family:inherit;}
    input,select,textarea{font-family:inherit;}
    a{color:#34D399;word-break:break-all;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#2A3560;border-radius:2px;}
    #loading{display:flex;height:100vh;align-items:center;justify-content:center;color:#8892B0;font-size:14px;flex-direction:column;gap:8px;}
    .spin{width:24px;height:24px;border:2px solid #2A3560;border-top-color:#38BDF8;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pulse{animation:pulse 1.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .calcell{touch-action:none;user-select:none;}
  </style>
</head>
<body>
  <div id="root"><div id="loading"><div class="spin"></div>Đang tải ứng dụng...</div></div>
  <script>
    setTimeout(function(){
      if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
        document.getElementById("root").innerHTML =
          '<div style="display:flex;height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:20px;text-align:center;color:#E2E8F0;font-family:sans-serif;">' +
          '<div style="font-size:32px;">⚠️</div>' +
          '<div style="font-size:15px;font-weight:700;">Không tải được thư viện cần thiết</div>' +
          '<div style="font-size:13px;color:#8892B0;max-width:340px;">Hãy mở file này trực tiếp bằng trình duyệt (Chrome/Safari/Edge), không qua khung xem trước.</div>' +
          '</div>';
      }
    }, 8000);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ═══════════════════════════════════════════════
    //  THEME
    // ═══════════════════════════════════════════════
    const T = {
      bg:"#0D1117", surf:"#161B27", surf2:"#1A2040",
      border:"#2A3560", text:"#E2E8F0", t2:"#8892B0", t3:"#4A5568",
      c1:"#38BDF8", c2:"#A78BFA", ok:"#4ADE80", xp:"#FCD34D", err:"#F87171",
    };

    // ═══════════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════════
    const uid    = () => Math.random().toString(36).slice(2,9);
    const dleft  = s  => Math.max(0, Math.floor((new Date(s)-new Date())/86400000));
    const fmt    = d  => new Date(d).toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit"});
    const toKey  = d  => { const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`; };
    const addDay = (d,n) => { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt; };
    const monday = d  => { const dt=new Date(d),day=dt.getDay()||7; dt.setDate(dt.getDate()-day+1); dt.setHours(0,0,0,0); return dt; };
    const sColor = s  => ({micro:T.c1,macro:"#FB7185",german:T.c2,english:"#34D399",general:T.t3}[s]||T.t3);
    const nowKey = ()  => toKey(new Date());
    const HOURS  = Array.from({length:13},(_,i)=>8+i);
    const hourLbl= h => `${String(h).padStart(2,"0")}:00`;
    const toMinutes = t => { const [h,m]=(t||"0:0").split(":").map(Number); return h*60+(m||0); };
    const DAY_SHORT = ["T2","T3","T4","T5","T6","T7","CN"];
    const SUBJECTS  = [
      {key:"micro", label:"📊 Microeconometrics"},
      {key:"macro", label:"📈 Macroeconomics"},
      {key:"german",label:"🇩🇪 Tiếng Đức"},
      {key:"english",label:"🇬🇧 Tiếng Anh"},
    ];
    const NOTE_FILTERS = [
      {key:"all",label:"Tất cả"},{key:"micro",label:"📊 Micro"},
      {key:"macro",label:"📈 Macro"},{key:"german",label:"🇩🇪 Đức"},
      {key:"english",label:"🇬🇧 Anh"},{key:"question",label:"❓ Câu hỏi"},
    ];
    const D_DUR = [
      {text:"Giảng lại concept cho nhau (Feynman)"},
      {text:"So sánh đáp án & cách giải"},
      {text:"Giải câu hỏi tự soạn của nhau"},
    ];
    const D_POST = [
      {text:"Viết shared note vào ứng dụng"},{text:"Assign nhiệm vụ cho buổi tới"},
    ];
    const STEPS5 = ["Đọc lý thuyết","Làm bài tập","Soạn 3 câu hỏi","Học nhóm xong","Note đã lưu"];
    const NAME1 = "Joey", NAME2 = "Denise";
    const personName = id => id===1?NAME1:id===2?NAME2:`Bạn ${id}`;
    const COLOR_SWATCHES = ["#38BDF8","#FB7185","#A78BFA","#FCD34D","#34D399","#F472B6","#FB923C"];

    // ═══════════════════════════════════════════════
    //  DEFAULT DATA FACTORIES
    // ═══════════════════════════════════════════════
    const mkSubitems = () => STEPS5.map(label=>({id:uid(),label,done:false,doneBy:null,_t:0}));
    const mkTopic = label => ({id:uid(), label, subitems:mkSubitems()});
    const mkSection = (label,topicLabels) => ({id:uid(), label, topics:topicLabels.map(mkTopic)});

    const mkMicro = () => ({
      id:uid(), key:"micro", label:"Microeconometrics", icon:"📊", color:"#38BDF8", examDate:"2026-07-22", _t:Date.now(),
      sections:[
        mkSection("Part A: Non-linear models", ["Maximum-Likelihood Estimation","Binary Outcome Models","Multinomial, Ordered and Count Data Models","Limited Dependent Variables (Tobit, Sample Selection)"]),
        mkSection("Part B: Causal Analysis", ["Causal Diagrams and Potential Outcome Model","Machine Learning","Propensity Score Matching","Instrumental Variables","Difference-in-Differences","Regression Discontinuity"]),
        mkSection("Khác", ["R Programming"]),
      ],
    });
    const mkMacro = () => ({
      id:uid(), key:"macro", label:"Macroeconomics", icon:"📈", color:"#FB7185", examDate:"2026-08-11", _t:Date.now(),
      sections:[
        mkSection("", ["Solow model and Ramsey model","Ramsey model","Simple RBC/DSGE model","System dynamics and Solow model","Smith model","Ricardo model and limits to growth","Goodwin-Minsky-Keen model","Business cycles","The modeling process"]),
      ],
    });
    const mkLangCat = (key,label) => ({id:uid(), key, label, items:[], _t:0});
    const mkLanguage = (key,label,icon,color) => ({
      id:uid(), key, label, icon, color, _t:Date.now(),
      categories:[mkLangCat("grammar","Ngữ pháp"),mkLangCat("vocab","Từ vựng"),mkLangCat("speaking","Nói"),mkLangCat("writing","Viết")],
    });
    const mkKeyDates = () => ([
      {id:uid(), label:"Thi Microeconometrics", date:"2026-07-22", color:"#38BDF8", icon:"📊", _t:Date.now()},
      {id:uid(), label:"Xin việc làm (Đức)", date:"2026-08-01", color:"#A78BFA", icon:"💼", _t:Date.now()},
      {id:uid(), label:"Thi Macroeconomics", date:"2026-08-11", color:"#FB7185", icon:"📈", _t:Date.now()},
    ]);
    const mkPreTodos = () => ([
      {id:uid(), text:"Ôn lý thuyết & làm bài tập", doneBy1:false, doneBy2:false, _t1:0, _t2:0},
      {id:uid(), text:"Soạn 3 câu hỏi cho chủ đề", doneBy1:false, doneBy2:false, _t1:0, _t2:0},
    ]);
    const mkDuringTodos = () => D_DUR.map(t=>({id:uid(),text:t.text,done:false,doneBy:null,_t:0}));
    const mkPostTodos   = () => D_POST.map(t=>({id:uid(),text:t.text,done:false,doneBy:null,_t:0}));

    const EMPTY_DEL = { sessions:{}, notes:{}, todos:{}, events:{}, subjects:{}, languages:{}, keyDates:{} };

    const mkData = () => ({
      sessions:[{
        id:uid(), date:toKey(addDay(new Date(),2)), time:"14:00",
        subject:"micro", topic:"Maximum-Likelihood Estimation", topicId:null,
        status:"planned", notes:"", _t:Date.now(),
        preTodos:mkPreTodos(), duringTodos:mkDuringTodos(), postTodos:mkPostTodos(),
      }],
      notes:[{id:uid(),title:"Kế hoạch học nhóm tổng quan",content:"Phase 1 (15/6–12/7): Micro + ngôn ngữ hàng ngày\nPhase 2 (13/7–11/8): Macro + ngôn ngữ\nPhase 3 (từ 12/8): CV & xin việc",type:"text",subject:"general",by:1,date:"15/06/2026",_t:Date.now(),comments:[]}],
      todos:[{id:uid(),text:"Ôn lý thuyết MLE trước buổi học đầu tiên",who:"both",subject:"micro",doneBy1:false,doneBy2:false,_t1:0,_t2:0,_t:Date.now()}],
      events:[],
      avail:{},
      subjects:[mkMicro(), mkMacro()],
      languages:[mkLanguage("german","Tiếng Đức","🇩🇪","#A78BFA"), mkLanguage("english","Tiếng Anh","🇬🇧","#34D399")],
      keyDates: mkKeyDates(),
      _deleted: {...EMPTY_DEL},
    });

    function migrate(d){
      if(!d) return mkData();
      if(!d._deleted) d._deleted={...EMPTY_DEL};
      Object.keys(EMPTY_DEL).forEach(k=>{ if(!d._deleted[k]) d._deleted[k]={}; });
      if(!d.subjects || !d.subjects.length) d.subjects=[mkMicro(), mkMacro()];
      if(!d.languages || !d.languages.length) d.languages=[mkLanguage("german","Tiếng Đức","🇩🇪","#A78BFA"), mkLanguage("english","Tiếng Anh","🇬🇧","#34D399")];
      if(!d.keyDates || !d.keyDates.length) d.keyDates=mkKeyDates();
      if(!d.avail) d.avail={};
      if(!d.events) d.events=[];
      d.events.forEach(e=>{
        if(!e.time) e.time="08:00";
        if(!e.endTime){ const h=parseInt(e.time.split(":")[0]); e.endTime=`${String((h+1)%24).padStart(2,"0")}:${e.time.split(":")[1]||"00"}`; }
      });
      if(!d.sessions) d.sessions=[];
      if(!d.notes) d.notes=[];
      if(!d.todos) d.todos=[];
      d.sessions.forEach(s=>{
        if(s.topicId===undefined) s.topicId=null;
        (s.preTodos||[]).forEach(t=>{ if(t.doneBy1===undefined){ const old=!!t.done; t.doneBy1=old; t.doneBy2=old; t._t1=t._t||0; t._t2=t._t||0; delete t.done; } });
        (s.duringTodos||[]).forEach(t=>{ if(t.doneBy===undefined) t.doneBy=null; });
        (s.postTodos||[]).forEach(t=>{ if(t.doneBy===undefined) t.doneBy=null; });
      });
      d.todos.forEach(t=>{ if(t.doneBy1===undefined){ const old=!!t.done; t.doneBy1=old; t.doneBy2=old; t._t1=t._t||0; t._t2=t._t||0; delete t.done; } });
      d.notes.forEach(n=>{ if(!n.comments) n.comments=[]; });
      return d;
    }

    // ═══════════════════════════════════════════════
    //  LOCAL STORAGE
    // ═══════════════════════════════════════════════
    const LS_DATA = "squad-v4-data";
    const LS_ID   = "squad-v4-id";
    const LS_ROOM = "squad-v4-room";
    const loadData = () => { try{ const s=localStorage.getItem(LS_DATA); return migrate(s?JSON.parse(s):null); }catch{ return mkData(); } };
    const saveData = d  => { try{ localStorage.setItem(LS_DATA,JSON.stringify(d)); }catch{} };
    const loadId   = () => { try{ return parseInt(localStorage.getItem(LS_ID))||null; }catch{ return null; } };
    const saveId   = id => { try{ localStorage.setItem(LS_ID,String(id)); }catch{} };
    const loadRoom = () => { try{ return localStorage.getItem(LS_ROOM)||null; }catch{ return null; } };
    const saveRoom = r  => { try{ if(r) localStorage.setItem(LS_ROOM,r); else localStorage.removeItem(LS_ROOM); }catch{} };

    // ═══════════════════════════════════════════════
    //  MERGE LOGIC
    // ═══════════════════════════════════════════════
    function mergeList(localArr, cloudArr, localDel, cloudDel){
      const del = {...(cloudDel||{})};
      Object.entries(localDel||{}).forEach(([id,t])=>{ del[id]=Math.max(t||0, del[id]||0); });
      const map = new Map();
      [...(cloudArr||[]), ...(localArr||[])].forEach(item=>{
        if(!item || !item.id) return;
        const ex = map.get(item.id);
        if(!ex || (item._t||0) >= (ex._t||0)) map.set(item.id, item);
      });
      const items = Array.from(map.values()).filter(item=>{
        const dt = del[item.id];
        return !dt || dt < (item._t||0);
      });
      return { items, del };
    }
    function mergeAvail(local, cloud, myId){
      const localA = local||{}, cloudA = cloud||{};
      const dates = new Set([...Object.keys(localA), ...Object.keys(cloudA)]);
      const out = {};
      dates.forEach(d=>{
        const c = cloudA[d]||{}, l = localA[d]||{};
        const merged = {...c};
        if(myId && l[myId]) merged[myId] = l[myId];
        Object.keys(l).forEach(k=>{ if(!(k in merged)) merged[k]=l[k]; });
        out[d]=merged;
      });
      return out;
    }
    function mergeData(local, cloud, myId){
      if(!cloud) return local;
      const ld = local._deleted || EMPTY_DEL, cd = cloud._deleted || EMPTY_DEL;
      const sessions = mergeList(local.sessions, cloud.sessions, ld.sessions, cd.sessions);
      const notes    = mergeList(local.notes,    cloud.notes,    ld.notes,    cd.notes);
      const todos    = mergeList(local.todos,    cloud.todos,    ld.todos,    cd.todos);
      const events   = mergeList(local.events,   cloud.events,   ld.events,   cd.events);
      const subjects = mergeList(local.subjects, cloud.subjects, ld.subjects, cd.subjects);
      const languages= mergeList(local.languages,cloud.languages,ld.languages,cd.languages);
      const keyDates = mergeList(local.keyDates, cloud.keyDates, ld.keyDates, cd.keyDates);
      const avail    = mergeAvail(local.avail, cloud.avail, myId);
      return {
        sessions: sessions.items, notes: notes.items, todos: todos.items, events: events.items,
        subjects: subjects.items, languages: languages.items, keyDates: keyDates.items,
        avail,
        _deleted: { sessions:sessions.del, notes:notes.del, todos:todos.del, events:events.del, subjects:subjects.del, languages:languages.del, keyDates:keyDates.del },
      };
    }

    // ═══════════════════════════════════════════════
    //  CLOUD BACKEND (KVdb.io)
    // ═══════════════════════════════════════════════
    const KV_ROOT = "https://kvdb.io";
    const KV_SECTIONS = ["sessions","notes","todos","events","avail","subjects","languages","keyDates","_deleted"];
    async function kvCreateBucket(){
      let res;
      try{
        res = await fetch(KV_ROOT + "/", { method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:"email="+encodeURIComponent(`squad-${uid()}@squadspace.local`) });
      }catch(networkErr){
        throw new Error("NETWORK: "+(networkErr && networkErr.message ? networkErr.message : "fetch failed — có thể bị chặn bởi mạng/ad-blocker"));
      }
      if(!res.ok){
        let body=""; try{ body=(await res.text()).slice(0,200); }catch(_){}
        throw new Error(`HTTP ${res.status}${res.statusText?" "+res.statusText:""}${body?": "+body:""}`);
      }
      const id=(await res.text()).trim();
      if(!id||id.length<5) throw new Error("Phản hồi không hợp lệ từ dịch vụ (id rỗng hoặc quá ngắn): \""+id+"\"");
      return id;
    }
    async function kvGetSection(bucket,key){
      const res = await fetch(`${KV_ROOT}/${bucket}/${key}`, {cache:"no-store"});
      if(res.status===404) return null;
      if(!res.ok) throw new Error("get-failed");
      const text = await res.text();
      if(!text) return null;
      try{ return JSON.parse(text); }catch{ return null; }
    }
    async function kvSetSection(bucket,key,value){
      const res = await fetch(`${KV_ROOT}/${bucket}/${key}`, {method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(value)});
      if(!res.ok) throw new Error("set-failed");
    }
    async function cloudPull(bucket){
      const results = await Promise.all(KV_SECTIONS.map(k=>kvGetSection(bucket,k).catch(()=>null)));
      const out={}; KV_SECTIONS.forEach((k,i)=>{ out[k]=results[i]; });
      return migrate(out);
    }
    async function cloudPush(bucket,data){
      await Promise.all(KV_SECTIONS.map(k=>{
        const v = data[k] ?? (k==="avail"||k==="_deleted" ? {} : []);
        return kvSetSection(bucket,k,v);
      }));
    }

    // ═══════════════════════════════════════════════
    //  GAMIFICATION
    // ═══════════════════════════════════════════════
    const LEVEL_T = [0,200,500,1000,1800,2800,4200,6000];
    const LEVEL_N = ["Tân binh","Học viên","Chăm chỉ","Scholar","Researcher","Expert","Master","Giáo sư 🎓"];
    function getLevel(xp){
      let lv=0; for(let i=0;i<LEVEL_T.length;i++) if(xp>=LEVEL_T[i]) lv=i;
      const isMax = lv===LEVEL_T.length-1;
      const cur=LEVEL_T[lv], next= isMax? cur: LEVEL_T[lv+1];
      const pct = isMax?100:Math.round((xp-cur)/(next-cur)*100);
      return {level:lv+1, name:LEVEL_N[lv], pct};
    }
    function computeGame(data){
      let xp=0; const weekly={1:0,2:0}; const days=new Set();
      const weekAgo = Date.now()-7*86400000;
      const addT=t=>{ if(t) days.add(toKey(new Date(t))); };
      (data.subjects||[]).forEach(subj=>{
        addT(subj._t);
        (subj.sections||[]).forEach(sec=>(sec.topics||[]).forEach(top=>(top.subitems||[]).forEach(si=>{
          if(si.done){ xp+=10; if(si._t>weekAgo && si.doneBy) weekly[si.doneBy]=(weekly[si.doneBy]||0)+1; }
        })));
      });
      (data.languages||[]).forEach(lang=>{
        addT(lang._t);
        (lang.categories||[]).forEach(cat=>(cat.items||[]).forEach(it=>{
          if(it.done){ xp+=10; if(it._t>weekAgo && it.doneBy) weekly[it.doneBy]=(weekly[it.doneBy]||0)+1; }
        }));
      });
      (data.sessions||[]).forEach(s=>{
        addT(s._t);
        [...(s.duringTodos||[]),...(s.postTodos||[])].forEach(t=>{ if(t.done){ xp+=10; if(t._t>weekAgo && t.doneBy) weekly[t.doneBy]=(weekly[t.doneBy]||0)+1; } });
        (s.preTodos||[]).forEach(t=>{
          if(t.doneBy1){ xp+=10; if(t._t1>weekAgo) weekly[1]=(weekly[1]||0)+1; }
          if(t.doneBy2){ xp+=10; if(t._t2>weekAgo) weekly[2]=(weekly[2]||0)+1; }
        });
      });
      (data.todos||[]).forEach(t=>{
        addT(t._t);
        if(t.doneBy1){ xp+=10; if(t._t1>weekAgo) weekly[1]=(weekly[1]||0)+1; }
        if(t.doneBy2){ xp+=10; if(t._t2>weekAgo) weekly[2]=(weekly[2]||0)+1; }
      });
      (data.notes||[]).forEach(n=>addT(n._t));
      let streak=0, cur=new Date();
      if(!days.has(toKey(cur))){ cur=addDay(cur,-1); if(!days.has(toKey(cur))){ return {xp,weekly,streak:0,level:getLevel(xp)}; } }
      while(days.has(toKey(cur))){ streak++; cur=addDay(cur,-1); }
      return {xp, weekly, streak, level:getLevel(xp)};
    }

    // ═══════════════════════════════════════════════
    //  SMALL UI PIECES
    // ═══════════════════════════════════════════════
    function Bar({value,max,color,h=5}){
      const w=max>0?Math.min(100,Math.round(value/max*100)):0;
      return <div style={{background:T.border,borderRadius:99,height:h,overflow:"hidden"}}>
        <div style={{width:`${w}%`,height:"100%",background:color,borderRadius:99,transition:"width .4s",minWidth:w>0?3:0}}/>
      </div>;
    }
    function PillBtn({active,onClick,children}){
      return <button onClick={onClick} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:active?T.text:"#1E2A40",color:active?T.bg:T.t2,whiteSpace:"nowrap"}}>{children}</button>;
    }
    function Field({label,children}){ return <div><div style={{fontSize:10,color:T.t2,marginBottom:3}}>{label}</div>{children}</div>; }
    function Input({value,onChange,placeholder,type="text",style={},onKeyDown}){
      return <input type={type} value={value} onChange={onChange} onKeyDown={onKeyDown} placeholder={placeholder} style={{width:"100%",padding:"7px 10px",background:"#0D1117",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,outline:"none",boxSizing:"border-box",...style}}/>;
    }
    function Select({value,onChange,options,style={}}){
      return <select value={value} onChange={onChange} style={{width:"100%",padding:"7px 10px",background:"#0D1117",border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,outline:"none",boxSizing:"border-box",...style}}>
        {options.map(o=><option key={o.key||o.value||o} value={o.key||o.value||o}>{o.label||o}</option>)}
      </select>;
    }
    function InlineAdd({onAdd,color,placeholder}){
      const[v,setV]=useState("");
      const go=()=>{ if(v.trim()){onAdd(v.trim());setV("");} };
      return <div style={{display:"flex",gap:6,marginTop:6}}>
        <input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder={placeholder||"+ Thêm..."}

    // ═══════════════════════════════════════════════
    //  TAB: CALENDAR (hourly grid + drag select)
    // ═══════════════════════════════════════════════
    function CalendarTab({data,setData,myId}){
      const[wk,setWk]=useState(()=>monday(new Date()));
      const[evForm,setEvForm]=useState(null);
      const dragRef = useRef({active:false, mode:"set"});

      useEffect(()=>{
        const up=()=>{ dragRef.current.active=false; };
        window.addEventListener("mouseup",up); window.addEventListener("touchend",up);
        return ()=>{ window.removeEventListener("mouseup",up); window.removeEventListener("touchend",up); };
      },[]);

      const isFree = (dk,h,p) => ((data.avail[dk]||{})[p]||[]).includes(h);
      const setFree = (dk,h,p,val) => setData(prev=>{
        const av={...(prev.avail||{})}; const day={...(av[dk]||{})}; let arr=[...(day[p]||[])];
        if(val && !arr.includes(h)) arr.push(h);
        if(!val) arr=arr.filter(x=>x!==h);
        day[p]=arr; av[dk]=day;
        return {...prev,avail:av};
      });
      const handleDown=(dk,h)=>{ if(!myId)return; const cur=isFree(dk,h,myId); dragRef.current={active:true,mode:cur?"unset":"set"}; setFree(dk,h,myId,!cur); };
      const handleEnter=(dk,h)=>{ if(!myId||!dragRef.current.active) return; setFree(dk,h,myId, dragRef.current.mode==="set"); };
      const handleTouchMove=e=>{
        if(!dragRef.current.active) return;
        const t=e.touches[0]; if(!t) return;
        const el=document.elementFromPoint(t.clientX,t.clientY);
        const cell = el && el.closest && el.closest("[data-dk]");
        if(cell) handleEnter(cell.getAttribute("data-dk"), parseInt(cell.getAttribute("data-hour")));
      };

      const delEvent = id => setData(p=>({...p, events:p.events.filter(e=>e.id!==id), _deleted:{...p._deleted, events:{...p._deleted.events,[id]:Date.now()}}}));
      const wDays=Array(7).fill(0).map((_,i)=>addDay(wk,i));
      const wSess=data.sessions.filter(s=>{const d=new Date(s.date);return d>=wk&&d<=addDay(wk,6);});
      const wEvs=(data.events||[]).filter(e=>{const d=new Date(e.date);return d>=wk&&d<=addDay(wk,6);});

      return <div>
        {!myId&&<div style={{background:"#FCD34D22",border:"1px solid #FCD34D44",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#FCD34D",marginBottom:14}}>
          ⚠️ Chọn "Tôi là {NAME1} / {NAME2}" ở trên để đánh dấu lịch rảnh — kéo qua nhiều ô để chọn nhanh
        </div>}

        <div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap"}}>
          {[{color:T.c1,label:`${NAME1} rảnh`},{color:T.c2,label:`${NAME2} rảnh`},{color:T.ok,label:"Cả 2 rảnh ✓"}].map((l,i)=>
            <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:l.color}}/>
              <span style={{fontSize:11,color:T.t2}}>{l.label}</span>
            </div>
          )}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={()=>setWk(w=>addDay(w,-7))} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.surf,color:T.text,cursor:"pointer"}}>‹</button>
          <span style={{flex:1,textAlign:"center",fontSize:13,fontWeight:600}}>{fmt(wk)} – {fmt(addDay(wk,6))}</span>
          <button onClick={()=>setWk(w=>addDay(w,7))}  style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.surf,color:T.text,cursor:"pointer"}}>›</button>
          <button onClick={()=>setWk(monday(new Date()))} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${T.border}`,background:T.surf,color:T.t2,cursor:"pointer",fontSize:11}}>Hôm nay</button>
        </div>

        <div style={{overflowX:"auto",marginBottom:8}} onTouchMove={handleTouchMove}>
          <div style={{minWidth:560}}>
            <div style={{display:"grid",gridTemplateColumns:"46px repeat(7,1fr)",gap:2,marginBottom:2}}>
              <div/>
              {wDays.map((d,i)=>{ const today=toKey(d)===nowKey();
                return <div key={i} style={{textAlign:"center",padding:"4px 2px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:today?T.c1:T.t2}}>{DAY_SHORT[i]}</div>
                  <div style={{fontSize:9,color:today?T.c1:T.t3}}>{fmt(d)}</div>
                </div>;
              })}
            </div>
            {/* Hourly grid */}
            {HOURS.map(h=><div key={h} style={{display:"grid",gridTemplateColumns:"46px repeat(7,1fr)",gap:2,marginBottom:2}}>
              <div style={{fontSize:9,color:T.t3,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:3}}>{hourLbl(h)}</div>
              {wDays.map((d,di)=>{
                const dk=toKey(d);
                const a1=isFree(dk,h,1), a2=isFree(dk,h,2), both=a1&&a2;
                const sess = data.sessions.find(s=>s.date===dk && parseInt((s.time||"0:0").split(":")[0])===h);
                const ev = (data.events||[]).find(e=>e.date===dk && toMinutes(e.time)<((h+1)*60) && toMinutes(e.endTime||e.time)>h*60);
                const evIsFirstCell = ev && Math.floor(toMinutes(ev.time)/60)===h;
                const accent = sess?T.ok:ev?T.xp:null;
                return <div key={di} className="calcell" data-dk={dk} data-hour={h}
                  onMouseDown={()=>handleDown(dk,h)} onMouseEnter={()=>handleEnter(dk,h)} onTouchStart={()=>handleDown(dk,h)}
                  style={{
                    minHeight:26,borderRadius:4,cursor:"pointer",padding:"1px 2px",
                    border:`1px solid ${accent||(both?T.ok:a1?T.c1:a2?T.c2:T.border)}`,
                    background:sess?"#001810":ev?"#1f1606":both?`${T.ok}22`:a1?`${T.c1}1c`:a2?`${T.c2}1c`:"transparent",
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,
                  }}>
                  {sess && <div style={{fontSize:7,color:T.ok,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>📚{sess.subject}</div>}
                  {ev && evIsFirstCell && <div style={{fontSize:7,color:T.xp,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>⚡{ev.title}</div>}
                </div>;
              })}
            </div>)}
          </div>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"14px 0 10px"}}>
          <div style={{fontSize:12,fontWeight:700,color:T.t2}}>TUẦN NÀY</div>
          <button onClick={()=>setEvForm({title:"",date:nowKey(),time:"14:00",endTime:"15:00"})} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${T.xp}44`,background:"transparent",color:T.xp,cursor:"pointer",fontSize:11,fontWeight:600}}>+ Thêm event</button>
        </div>

        {evForm&&<div style={{background:T.surf,border:`1px solid ${T.xp}44`,borderRadius:10,padding:14,marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:8,marginBottom:6}}>
            <Field label="Tên event / hoạt động"><Input value={evForm.title} onChange={e=>setEvForm(f=>({...f,title:e.target.value}))} placeholder="Workshop, tình nguyện, networking..."/></Field>
            <Field label="Ngày"><Input type="date" value={evForm.date} onChange={e=>setEvForm(f=>({...f,date:e.target.value}))}/></Field>
            <Field label="Bắt đầu"><Input type="time" value={evForm.time} onChange={e=>setEvForm(f=>({...f,time:e.target.value}))}/></Field>
            <Field label="Kết thúc"><Input type="time" value={evForm.endTime} onChange={e=>setEvForm(f=>({...f,endTime:e.target.value}))}/></Field>
          </div>
          <div style={{fontSize:10,color:T.t3,fontStyle:"italic",marginBottom:8}}>* Mặc định: cả 2 cùng dự định tham gia</div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setEvForm(null)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.t2,cursor:"pointer",fontSize:12}}>Hủy</button>
            <button onClick={()=>{
              if(!evForm.title||!evForm.date) return;
              let endTime = evForm.endTime;
              if(toMinutes(endTime)<=toMinutes(evForm.time)) endTime = `${String((parseInt(evForm.time.split(":")[0])+1)%24).padStart(2,"0")}:${evForm.time.split(":")[1]}`;
              setData(p=>({...p,events:[...(p.events||[]),{...evForm,endTime,id:uid(),_t:Date.now()}]}));

            }} style={{padding:"6px 12px",borderRadius:6,border:"none",background:T.xp,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Thêm</button>
          </div>
        </div>}

        {!wSess.length&&!wEvs.length
          ? <div style={{textAlign:"center",padding:20,color:T.t3,fontSize:13}}>Tuần này chưa có lịch. Kéo qua các ô để đánh dấu rảnh.</div>
          : [...wSess.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surf,border:`1px solid ${T.border}`,borderRadius:8,marginBottom:6}}>
              <span style={{fontSize:16}}>{s.subject==="micro"?"📊":s.subject==="macro"?"📈":"🌍"}</span>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{s.topic}</div><div style={{fontSize:11,color:T.t2}}>{new Date(s.date).toLocaleDateString("vi-VN")} · {s.time}</div></div>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`${T.ok}22`,color:T.ok}}>📚 Học nhóm</span>
            </div>),
            ...wEvs.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surf,border:`1px solid ${T.border}`,borderRadius:8,marginBottom:6}}>
              <span style={{fontSize:16}}>⚡</span>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.title}</div><div style={{fontSize:11,color:T.t2}}>{new Date(e.date).toLocaleDateString("vi-VN")} · {e.time}{e.endTime?`–${e.endTime}`:""} · cả 2 cùng tham gia</div></div>
              <button onClick={()=>delEvent(e.id)} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:16}}>×</button>
            </div>)
          ]
        }
      </div>;

    function SubjectForm({onSave,onCancel}){

          <Field label="Tên môn học"><Input value={f.label} onChange={e=>setF(p=>({...p,label:e.target.value,key:e.target.value.toLowerCase().replace(/\s+/g,"-")}))} placeholder="vd: Statistics"/></Field>
          <Field label="Icon (emoji)"><Input value={f.icon} onChange={e=>setF(p=>({...p,icon:e.target.value}))} placeholder="📘"/></Field>
        </div>
        <Field label="Ngày thi (không bắt buộc)"><Input type="date" value={f.examDate} onChange={e=>setF(p=>({...p,examDate:e.target.value}))}/></Field>
        <div style={{margin:"8px 0"}}>
          <div style={{fontSize:10,color:T.t2,marginBottom:4}}>Màu</div>
          <div style={{display:"flex",gap:6}}>{COLOR_SWATCHES.map(c=><div key={c} onClick={()=>setF(p=>({...p,color:c}))} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:f.color===c?`2px solid ${T.text}`:"2px solid transparent"}}/>)}</div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>

          <button onClick={()=>{ if(f.label) onSave(f); }} style={{padding:"6px 12px",borderRadius:6,border:"none",background:T.ok,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Tạo môn học</button>
        </div>
      </div>;

    function TopicRow({subj,sec,top,sessions,editMode,onToggleSub,onAddSub,onDelSub,onDelTopic,onRename}){
      const[open,setOpen]=useState(false);
      const doneCnt=(top.subitems||[]).filter(s=>s.done).length, total=(top.subitems||[]).length;
      const allDone = total>0 && doneCnt===total, inProg = doneCnt>0 && !allDone;
      const linkedCount = sessions.filter(s=>s.topicId===top.id).length;
      return <div style={{marginBottom:5}}>
        <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",background:allDone?"#011208":open?"#1A2545":T.surf,border:`1px solid ${allDone?T.ok+"55":open?subj.color+"66":T.border}`,borderRadius:open?"8px 8px 0 0":8,cursor:"pointer"}}>
          <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${allDone?T.ok:inProg?subj.color:"#364060"}`,background:allDone?T.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:8,color:"#000",fontWeight:900}}>{allDone?"✓":""}</div>
          <span style={{flex:1,fontSize:12,color:allDone?T.t3:T.text,textDecoration:allDone?"line-through":"none"}}>{top.label}</span>
          {linkedCount>0 && <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:`${subj.color}22`,color:subj.color}}>🔗{linkedCount}</span>}
          <span style={{fontSize:10,color:T.t3}}>{doneCnt}/{total}</span>
          <span style={{fontSize:9,color:T.t3}}>{open?"▲":"▼"}</span>
        </div>
        {open && <div style={{background:"#090D14",border:`1px solid ${subj.color}22`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:10}}>
          {(top.subitems||[]).map(si=><div key={si.id} onClick={()=>onToggleSub(si.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:2,cursor:"pointer",background:si.done?`${subj.color}14`:"transparent"}}>
            <DualCheck val={si.done} color={subj.color}/>
            <span style={{fontSize:11,color:si.done?subj.color:T.t2,flex:1}}>{si.label}</span>
            {editMode && <MiniBtn onClick={()=>onDelSub(si.id)} color={T.err}>×</MiniBtn>}
          </div>)}
          {editMode && <>
            <InlineAdd color={subj.color} placeholder="+ Thêm việc nhỏ..." onAdd={onAddSub}/>
            <div style={{marginTop:8,display:"flex",justifyContent:"flex-end"}}><MiniBtn onClick={onDelTopic} color={T.err}>🗑 Xóa topic này</MiniBtn></div>
          </>}
        </div>}
      </div>;
    }

    function SubjectsTab({data,setData}){
      const[editMode,setEditMode]=useState(false);
      const[addSubj,setAddSubj]=useState(false);
      const[addTopicSec,setAddTopicSec]=useState(null); // {subjId,secId}
      const[addSecSubj,setAddSecSubj]=useState(null);

      const bump = (subjId,fn) => setData(p=>({...p, subjects:p.subjects.map(s=>s.id!==subjId?s:{...fn(s),_t:Date.now()})}));
      const toggleSub = (subjId,secId,topId,subId,myId) => bump(subjId, s=>({...s, sections:s.sections.map(sec=>sec.id!==secId?sec:{...sec,topics:sec.topics.map(top=>top.id!==topId?top:{...top,subitems:top.subitems.map(si=>si.id!==subId?si:{...si,done:!si.done,doneBy:!si.done?myId:si.doneBy,_t:Date.now()})})})}));
      const addSubitem = (subjId,secId,topId,label) => bump(subjId, s=>({...s, sections:s.sections.map(sec=>sec.id!==secId?sec:{...sec,topics:sec.topics.map(top=>top.id!==topId?top:{...top,subitems:[...top.subitems,{id:uid(),label,done:false,doneBy:null,_t:0}]})})}));
      const delSubitem = (subjId,secId,topId,subId) => bump(subjId, s=>({...s, sections:s.sections.map(sec=>sec.id!==secId?sec:{...sec,topics:sec.topics.map(top=>top.id!==topId?top:{...top,subitems:top.subitems.filter(si=>si.id!==subId)})})}));
      const addTopic = (subjId,secId,label) => bump(subjId, s=>({...s, sections:s.sections.map(sec=>sec.id!==secId?sec:{...sec,topics:[...sec.topics,mkTopic(label)]})}));
      const delTopic = (subjId,secId,topId) => bump(subjId, s=>({...s, sections:s.sections.map(sec=>sec.id!==secId?sec:{...sec,topics:sec.topics.filter(t=>t.id!==topId)})}));
      const addSection = (subjId,label) => bump(subjId, s=>({...s, sections:[...s.sections,{id:uid(),label,topics:[]}]}));
      const delSection = (subjId,secId) => bump(subjId, s=>({...s, sections:s.sections.filter(sec=>sec.id!==secId)}));
      const addSubject = f => { setData(p=>({...p, subjects:[...p.subjects,{id:uid(),key:f.key||uid(),label:f.label,icon:f.icon||"📘",color:f.color,examDate:f.examDate||null,sections:[],_t:Date.now()}]})); setAddSubj(false); };
      const delSubject = id => setData(p=>({...p, subjects:p.subjects.filter(s=>s.id!==id), _deleted:{...p._deleted, subjects:{...p._deleted.subjects,[id]:Date.now()}}}));

      return <CtxConsumer render={myId=>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700}}>📚 Tiến độ môn học</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setEditMode(v=>!v)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${T.border}`,background:editMode?T.text:"transparent",color:editMode?T.bg:T.t2,cursor:"pointer",fontSize:11,fontWeight:600}}>✏️ {editMode?"Xong sửa":"Sửa nội dung"}</button>
              {editMode && <button onClick={()=>setAddSubj(true)} style={{padding:"6px 12px",borderRadius:20,border:"none",background:T.ok,color:"#000",cursor:"pointer",fontSize:11,fontWeight:700}}>+ Môn mới</button>}
            </div>
          </div>

          {addSubj && <SubjectForm onSave={addSubject} onCancel={()=>setAddSubj(false)}/>}

          {data.subjects.map(subj=>{
            const allTopics = subj.sections.flatMap(sec=>sec.topics);
            const allSub = allTopics.flatMap(t=>t.subitems||[]);
            const doneCnt = allSub.filter(s=>s.done).length, total = allSub.length;
            const pct = total>0?Math.round(doneCnt/total*100):0;
            return <div key={subj.id} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",marginBottom:8,background:`${subj.color}10`,border:`1px solid ${subj.color}33`,borderRadius:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:subj.color}}>{subj.icon} {subj.label}</div>
                  {subj.examDate && <div style={{fontSize:11,color:T.t2,marginTop:2}}>Thi {new Date(subj.examDate).toLocaleDateString("vi-VN")} · còn {dleft(subj.examDate)} ngày</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:22,fontWeight:800,color:pct===100?T.ok:subj.color}}>{pct}%</div>
                  {editMode && <MiniBtn onClick={()=>delSubject(subj.id)} color={T.err}>🗑</MiniBtn>}
                </div>
              </div>
              <Bar value={doneCnt} max={total||1} color={subj.color} h={4}/>
              <div style={{fontSize:11,color:T.t3,textAlign:"right",margin:"4px 0 10px"}}>{doneCnt}/{total} mục nhỏ</div>

              {subj.sections.map(sec=><div key={sec.id} style={{marginBottom:14}}>
                {sec.label && <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.t2,letterSpacing:.5}}>{sec.label}</div>
                  {editMode && <MiniBtn onClick={()=>delSection(subj.id,sec.id)} color={T.err}>🗑 section</MiniBtn>}
                </div>}
                {sec.topics.map(top=><TopicRow key={top.id} subj={subj} sec={sec} top={top} sessions={data.sessions} editMode={editMode}
                  onToggleSub={subId=>toggleSub(subj.id,sec.id,top.id,subId,myId)}
                  onAddSub={label=>addSubitem(subj.id,sec.id,top.id,label)}
                  onDelSub={subId=>delSubitem(subj.id,sec.id,top.id,subId)}
                  onDelTopic={()=>delTopic(subj.id,sec.id,top.id)}
                />)}
                {editMode && (addTopicSec && addTopicSec.subjId===subj.id && addTopicSec.secId===sec.id
                  ? <InlineAdd color={subj.color} placeholder="Tên topic mới..." onAdd={label=>{addTopic(subj.id,sec.id,label);setAddTopicSec(null);}}/>
                  : <button onClick={()=>setAddTopicSec({subjId:subj.id,secId:sec.id})} style={{marginTop:4,padding:"5px 10px",borderRadius:6,border:`1px dashed ${T.border}`,background:"transparent",color:T.t3,cursor:"pointer",fontSize:11}}>+ Thêm topic</button>)}
              </div>)}

              {editMode && (addSecSubj===subj.id
                ? <InlineAdd color={subj.color} placeholder="Tên section mới (vd: Part C)..." onAdd={label=>{addSection(subj.id,label);setAddSecSubj(null);}}/>
                : <button onClick={()=>setAddSecSubj(subj.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px dashed ${T.border}`,background:"transparent",color:T.t3,cursor:"pointer",fontSize:11}}>+ Thêm section</button>)}
            </div>;
          })}
        </div>
      }/>;
    }
